apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaflow-ui-backend-deployment
  namespace: default
  labels:
    app: metaflow-ui-backend
spec:
  selector:
    matchLabels:
      app: metaflow-ui-backend
  template:
    metadata:
      labels:
        app: metaflow-ui-backend
    spec:
      containers:
      - name: metaflow-ui-backend
        image: docker.io/netflixoss/metaflow_metadata_service
        command: ["/opt/latest/bin/python3", "-m", "services.ui_backend_service.ui_server"]
        env:
         - name: MF_METADATA_DB_HOST
           value: "metaflow-database-service"
         - name: MF_METADATA_DB_PORT
           value: '5432'
         - name: MF_METADATA_DB_USER
           value: 'postgres'
         - name: MF_METADATA_DB_PSWD
           value: 'postgres'
         - name: MF_METADATA_DB_NAME
           value: 'metaflow'
         - name: ORIGIN_TO_ALLOW_CORS_FROM
           value: "*"
        ports:
          - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: metaflow-ui-backend-service
  namespace: default
spec:
  selector:
    app: metaflow-ui-backend
  ports:
    - name: metadata-port
      protocol: TCP
      port: 8083
