apiVersion: apps/v1
kind: Deployment
metadata:
  name: metaflow-metadata-deployment
  namespace: default
  labels:
    app: metaflow-metadata
spec:
  selector:
    matchLabels:
      app: metaflow-metadata
  template:
    metadata:
      labels:
        app: metaflow-metadata
    spec:
      containers:
      - name: metaflow-metadata
        image: docker.io/netflixoss/metaflow_metadata_service
        # image: ubuntu
        # command: ["sleep", "10000"]
        env:
          - name: LOGLEVEL
            value: INFO
          - name: MF_METADATA_DB_HOST
            value: "metaflow-database-service"
          - name: MF_METADATA_DB_PORT
            value: "5432"
          - name:  MF_METADATA_DB_USER
            value: postgres
          - name:  MF_METADATA_DB_PSWD
            value: postgres
          - name:  MF_METADATA_DB_NAME
            value: metaflow
          - name:  MF_METADATA_PORT
            value: "8080"
          - name:  MF_METADATA_HOST
            value: 0.0.0.0
          - name:  MF_MIGRATION_PORT
            value: "8082"
        ports:
          - containerPort: 8080
          - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: metaflow-metadata-service
  namespace: default
spec:
  selector:
    app: metaflow-metadata
  ports:
    - name: metadata-port
      protocol: TCP
      port: 8080
    - name: migration
      protocol: TCP
      port: 8082
